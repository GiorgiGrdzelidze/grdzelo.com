    }
  </style>
  <rect width="32" height="32" rx="4" class="square"/>
  <text x="11" y="23" text-anchor="middle" font-family="Instrument Sans, Instrument Serif, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="22" letter-spacing="-0.04em" class="glyph">g</text>
  <rect x="18" y="10" width="5" height="13" class="cursor"/>
</svg>
